{% extends 'base.html' %}

{% block title %}{{ title }} - Organization Management{% endblock %}

{% block content %}
<div class="content-header">
  <h1><i class="fas fa-truck"></i> {{ title }}</h1>
</div>

<div class="row">
  <div class="col-md-8 offset-md-2">
    <div class="card">
      <div class="card-header">Supplier Information</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">{{ form.name.label }}</label>
              {{ form.name }}
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">{{ form.phone.label }}</label>
              {{ form.phone }}
            </div>
          </div>
          <div class="row">
            <div class="col-md-12 mb-3">
              <label class="form-label">{{ form.email.label }}</label>
              {{ form.email }}
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ form.address.label }}</label>
            {{ form.address }}
          </div>
          <div class="d-flex justify-content-between">
            <a href="{% url 'supplier_list' %}" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
            <button type="submit" class="btn btn-success">
              <i class="fas fa-save"></i> Save Supplier
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
